name: Score Predictions

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  trigger-scoring:
    runs-on: ubuntu-latest
    steps:
      - name: Call scoring endpoint
        run: |
          curl -sf -X GET "https://redlinef1.vercel.app/api/cron-score" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"